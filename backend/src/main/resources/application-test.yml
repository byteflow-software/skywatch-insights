spring:
  datasource:
    url: jdbc:tc:postgresql:16:///skywatch_test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: skywatch
    password: skywatch

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: test-secret-key-for-testing-only
    expiration: 900
    refresh-expiration: 604800
